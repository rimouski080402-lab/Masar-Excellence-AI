workflows:
  android-build:
    name: Build Android
    environment:
      node: latest
    scripts:
      - name: Install Cordova
        script: |
          npm install -g cordova
      - name: Organize Files
        script: |
          # 1. إنشاء مجلد www إذا لم يكن موجوداً
          mkdir -p www
          # 2. نقل ملفات الويب إلى مجلد www
          mv index.html www/
          # إذا كان لديك صور أو ملفات css/js انقلها أيضاً بنفس الطريقة
      - name: Add Platform and Build
        script: |
          # 3. إعداد المشروع للعمل
          cordova platform add android
          # 4. بناء التطبيق
          cordova build android
    artifacts:
      - platforms/android/app/build/outputs/apk/debug/*.apk
