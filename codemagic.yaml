workflows:
  android-build:
    name: Build Android
    environment:
      node: latest
    scripts:
      - name: List Files (Debug)
        script: |
          echo "محتوى المجلد الحالي هو:"
          ls -F
      - name: Install Cordova
        script: |
          npm install -g cordova
      - name: Build Android
        script: |
          cordova platform add android
          cordova build android
    artifacts:
      - platforms/android/app/build/outputs/apk/debug/*.apk
